<div class="card">
    <header class="header">
        <div class="title"> Быстрые действия </div>
    </header>
    <div class="buttons">
        @for (item of quickActionsButtons; track $index) {
            <button
                [iconStart]="item.icon"
                iconEnd="@tui.chevron-right"
                tuiButton
                appearance="outline"
                >{{ item.title }}</button
            >
        }
    </div>
</div>
